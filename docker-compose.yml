version: '3.8'
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - redis

volumes:
  redis-data:
