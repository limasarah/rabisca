name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target: none, vercel or render'
        required: false
        default: 'none'

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend

  backend:
    name: Install Backend
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Start backend (no Redis) and check /health
        run: |
          cd backend
          nohup env PORT=4000 DISABLE_REDIS=1 node server.js > /tmp/backend.log 2>&1 &
          sleep 2
          curl --fail http://localhost:4000/health
      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

  deploy:
    name: Manual Deploy
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'vercel' || github.event.inputs.deploy_target == 'render')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        if: ${{ github.event.inputs.deploy_target == 'vercel' }}
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          working-directory: frontend
      - name: Trigger Render deploy
        if: ${{ github.event.inputs.deploy_target == 'render' }}
        run: |
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'
